<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#C8102E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#F5C518" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
    <!-- grid lines -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- badge -->
  <rect x="450" y="80" width="300" height="38" rx="19" fill="#C8102E"/>
  <text x="600" y="104" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="white" text-anchor="middle" letter-spacing="3">KLJ KRUIBEKE +16 WEEKEND</text>

  <!-- WK -->
  <text x="600" y="270" font-family="Arial Black, Arial" font-weight="900" font-size="200" fill="#C8102E" text-anchor="middle" letter-spacing="4">WK</text>

  <!-- WEEKEND -->
  <text x="600" y="430" font-family="Arial Black, Arial" font-weight="900" font-size="160" fill="white" text-anchor="middle" letter-spacing="2">WEEK<tspan fill="#F5C518">END</tspan></text>

  <!-- subtext -->
  <text x="600" y="495" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="6">26 – 28 JUNI 2026 · DE KIEVIT, ROOSENDIJK</text>

  <!-- bottom red line -->
  <rect x="0" y="610" width="1200" height="4" fill="#C8102E"/>
</svg>
